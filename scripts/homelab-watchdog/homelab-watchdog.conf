# homelab-watchdog.conf — RELAY (netops) kitöltve, 2026-06-10 (kártya #8b646e4a)
# A docs/homelab-watchdog-proposal.md §2 mátrix szerint. Minden teszt-végpont ÉLŐBEN
# verifikálva (HTTP 200/302). Titok NINCS a fájlban: a host-IP-s smoke-tesztek nem kérnek
# kulcsot; a *arr API/kapcsolat-teszt opcionális, .env-ből (lásd lent).
#
# A tesztek a host-IP-re (192.168.1.105) mennek, mert az minden published portot elér
# (0.0.0.0- és LAN-bind szolgáltatást is) — egységes, nincs localhost-vs-LAN zavar.

############################  RECOVERY (determinisztikus) ########################
# MANAGED: a "futnia KELL" allowlist. Kihagyva: szándékosan leállítottak/.disabled
# (wireguard-ui, wireguard-ui-wg, wg-easy, wireguard-web-simple, watchtower, test-proxy,
# stirling-pdf) ÉS a mailcow stack (saját compose + watchdog-mailcow kezeli, restart=always —
# egy generikus watchdog ne micromanagelje a 21 egymásra épülő konténerét).
MANAGED=(
  # media / *arr
  radarr sonarr prowlarr qbittorrent overseerr plex serviio metube navidrome
  # net / dns / ingress / vpn
  adguard cloudflared nginx-proxy-manager-app-1 wireguard
  # security
  vaultwarden
  # productivity / docs
  nextcloud nextcloud-db nextcloud-redis nextcloud-cron
  paperless-ngx-webserver-1 paperless-ngx-db-1 paperless-ngx-broker-1
  forgejo obsidian dokuwiki filebrowser it-tools
  # smart home
  homeassistant go2rtc
  # monitoring / infra
  beszel beszel-agent uptime-kuma wud portainer dashy
  n8n ntfy ipfs mcp-workspace mcp-filesystem mcp-mcpvault mcp-smart-connections
  # saját oldalak
  cryptohungary-site cryptohungary-db hivelink-app hivelink-nginx kormany-site
)

# RECOVERY override: szándékosan ÜRES -> minden a biztonságos `docker start <név>` (csak a
# MEGLÉVŐ, leállt konténert indítja, SOSE recreate-el). Ha egy konténer teljesen hiányzik
# (nem csak leállt), a `docker start` elbukik -> MAX_ATTEMPTS után ESZKALÁCIÓ (ember dönt,
# nem a watchdog recreate-el vakon). Ez a legbiztonságosabb a "never data-losing recreate" elvhez.
declare -A RECOVERY=()

CONFIRM_CHECKS=2     # ennyi egymást követő futáson legyen down, mielőtt az 1. recovery indul
MAX_ATTEMPTS=3       # ennyi sikertelen recovery után -> eszkaláció (ntfy+Telegram+kanban) és leáll

############################  UPDATE (teszt-kapus full-auto) #####################
# MANUAL: SOSE auto-frissül, csak notify + kanban-kártya. A kockázatos kisebbség:
#  - mailcow: SAJÁT update.sh az egyetlen biztonságos út (ideálisan wud-ból is kihagyva).
#  - nextcloud (+ -db): major = occ upgrade lépések / adatformátum.
#  - homeassistant: integrációk törhetnek.
#  - adatbázisok: major bump = adatformátum-migráció (mariadb/postgres/redis).
# (Megj.: aminek nincs FULLAUTO_TEST-je, az ÚGYIS manual-ként viselkedik — ez csak az explicit lista.)
MANUAL=(
  mailcow
  nextcloud nextcloud-db
  homeassistant
  paperless-ngx-db-1 paperless-ngx-webserver-1   # paperless DB-migrációkat futtat update-kor
  cryptohungary-db nextcloud-redis paperless-ngx-broker-1
)

# FULLAUTO_TEST[c]: a post-update smoke/health teszt (exit 0 = PASS). EZ a kapu.
# Mind ÉLŐBEN verifikálva 2026-06-10. (-fsS: 4xx/5xx-en bukik, 200/302-n átmegy.)
declare -A FULLAUTO_TEST=(
  [it-tools]="curl -fsS http://192.168.1.105:8098/"
  [radarr]="curl -fsS http://192.168.1.105:7878/ping"
  [sonarr]="curl -fsS http://192.168.1.105:8989/ping"
  [prowlarr]="curl -fsS http://192.168.1.105:9696/ping"
  [qbittorrent]="curl -fsS http://192.168.1.105:8080/"
  [overseerr]="curl -fsS http://192.168.1.105:5055/api/v1/status"
  [plex]="curl -fsS http://192.168.1.105:32400/identity"
  [vaultwarden]="curl -fsS http://192.168.1.105:8091/alive"
  [navidrome]="curl -fsS http://192.168.1.105:8094/ping"
  [ntfy]="curl -fsS http://192.168.1.105:8097/v1/health"
  [forgejo]="curl -fsS http://192.168.1.105:8092/api/healthz"
  [n8n]="curl -fsS http://192.168.1.105:8096/healthz"
  [filebrowser]="curl -fsS http://192.168.1.105:8075/health"
  [dashy]="curl -fsS http://192.168.1.105:4000/"
  [kormany-site]="curl -fsS http://192.168.1.105:8100/"
  [wud]="curl -fsS http://192.168.1.105:8099/"
  [portainer]="curl -fsS http://192.168.1.105:9000/"
  [beszel]="curl -fsS http://192.168.1.105:8095/"
  [uptime-kuma]="curl -fsS http://192.168.1.105:8102/"
  # adguard: a VALÓDI funkcionális teszt egy DNS-feloldás (nem kell auth):
  [adguard]="dig +short +time=3 @192.168.1.105 cloudflare.com | grep -qE '^[0-9]+\\.'"
)
# OPCIONÁLIS gazdagabb *arr kapcsolat-teszt (a Prowlarr<->qBit lánc): kulcs KELL hozzá, ezért
# a kulcsok a .env-ből jönnek (NE ide!). Ha az operátor felveszi a RADARR_API_KEY stb.-t a
# citadel/.env-be, a teszt cserélhető pl.:
#   [radarr]="curl -fsS http://192.168.1.105:7878/ping && curl -fsS -H \"X-Api-Key: $RADARR_API_KEY\" http://192.168.1.105:7878/api/v3/system/status"
# Addig a /ping a verifikált alap-kapu (app feljött + DB betölthető).

# A full-auto konténerek frissítés-parancsai. $TAG = a cél-tag a SET_TAG futásakor.
# Minta: image-sor utolsó :tag cseréje a compose-ban; pull + up -d az adott service-re;
# backup a config bind-dirről frissítés ELŐTT (rollback-háló).
_C=/home/uplinkfather/docker            # compose-gyökér
_B=/home/uplinkfather/backups           # backup-gyökér

declare -A GET_TAG=(
  [it-tools]="docker inspect -f '{{.Config.Image}}' it-tools | sed 's/.*://'"
  [radarr]="docker inspect -f '{{.Config.Image}}' radarr | sed 's/.*://'"
  [sonarr]="docker inspect -f '{{.Config.Image}}' sonarr | sed 's/.*://'"
  [prowlarr]="docker inspect -f '{{.Config.Image}}' prowlarr | sed 's/.*://'"
  [qbittorrent]="docker inspect -f '{{.Config.Image}}' qbittorrent | sed 's/.*://'"
  [overseerr]="docker inspect -f '{{.Config.Image}}' overseerr | sed 's/.*://'"
  [navidrome]="docker inspect -f '{{.Config.Image}}' navidrome | sed 's/.*://'"
  [dashy]="docker inspect -f '{{.Config.Image}}' dashy | sed 's/.*://'"
  [filebrowser]="docker inspect -f '{{.Config.Image}}' filebrowser | sed 's/.*://'"
  [forgejo]="docker inspect -f '{{.Config.Image}}' forgejo | sed 's/.*://'"
  [n8n]="docker inspect -f '{{.Config.Image}}' n8n | sed 's/.*://'"
)
# SET_TAG: az adott compose image-sorának utolsó :tag-jét írja $TAG-re (repo-útvonal-független).
declare -A SET_TAG=(
  [it-tools]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/it-tools/docker-compose.yml"
  [radarr]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/radarr/docker-compose.yml"
  [sonarr]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/sonarr/docker-compose.yml"
  [prowlarr]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/prowlarr/docker-compose.yml"
  [qbittorrent]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/qbittorrent/docker-compose.yml"
  [overseerr]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/overseerr/docker-compose.yml"
  [navidrome]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/navidrome/docker-compose.yml"
  [dashy]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/dashy/docker-compose.yml"
  [filebrowser]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/filebrowser/docker-compose.yml"
  [forgejo]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/forgejo/docker-compose.yml"
  [n8n]="sed -i -E '/^[[:space:]]*image:/ s#:[^:]*\$#:'\"\$TAG\"'#' $_C/n8n/docker-compose.yml"
)
declare -A APPLY=(
  [it-tools]="docker compose -f $_C/it-tools/docker-compose.yml pull it-tools && docker compose -f $_C/it-tools/docker-compose.yml up -d it-tools"
  [radarr]="docker compose -f $_C/radarr/docker-compose.yml pull radarr && docker compose -f $_C/radarr/docker-compose.yml up -d radarr"
  [sonarr]="docker compose -f $_C/sonarr/docker-compose.yml pull sonarr && docker compose -f $_C/sonarr/docker-compose.yml up -d sonarr"
  [prowlarr]="docker compose -f $_C/prowlarr/docker-compose.yml pull prowlarr && docker compose -f $_C/prowlarr/docker-compose.yml up -d prowlarr"
  [qbittorrent]="docker compose -f $_C/qbittorrent/docker-compose.yml pull qbittorrent && docker compose -f $_C/qbittorrent/docker-compose.yml up -d qbittorrent"
  [overseerr]="docker compose -f $_C/overseerr/docker-compose.yml pull overseerr && docker compose -f $_C/overseerr/docker-compose.yml up -d overseerr"
  [navidrome]="docker compose -f $_C/navidrome/docker-compose.yml pull navidrome && docker compose -f $_C/navidrome/docker-compose.yml up -d navidrome"
  [dashy]="docker compose -f $_C/dashy/docker-compose.yml pull dashy && docker compose -f $_C/dashy/docker-compose.yml up -d dashy"
  [filebrowser]="docker compose -f $_C/filebrowser/docker-compose.yml pull filebrowser && docker compose -f $_C/filebrowser/docker-compose.yml up -d filebrowser"
  [forgejo]="docker compose -f $_C/forgejo/docker-compose.yml pull forgejo && docker compose -f $_C/forgejo/docker-compose.yml up -d forgejo"
  [n8n]="docker compose -f $_C/n8n/docker-compose.yml pull n8n && docker compose -f $_C/n8n/docker-compose.yml up -d n8n"
)
# BACKUP: a /config bind-dir tar-ja frissítés ELŐTT. it-tools stateless -> nincs backup (kihagyva).
declare -A BACKUP=(
  [radarr]="mkdir -p $_B/radarr && tar czf $_B/radarr/config-\$(date +%s).tar.gz -C $_C/radarr config"
  [sonarr]="mkdir -p $_B/sonarr && tar czf $_B/sonarr/config-\$(date +%s).tar.gz -C $_C/sonarr config"
  [prowlarr]="mkdir -p $_B/prowlarr && tar czf $_B/prowlarr/config-\$(date +%s).tar.gz -C $_C/prowlarr config"
  [qbittorrent]="mkdir -p $_B/qbittorrent && tar czf $_B/qbittorrent/config-\$(date +%s).tar.gz -C $_C/qbittorrent config"
  [overseerr]="mkdir -p $_B/overseerr && tar czf $_B/overseerr/config-\$(date +%s).tar.gz -C $_C/overseerr config"
  [navidrome]="mkdir -p $_B/navidrome && tar czf $_B/navidrome/config-\$(date +%s).tar.gz -C $_C/navidrome data"
  [forgejo]="mkdir -p $_B/forgejo && tar czf $_B/forgejo/config-\$(date +%s).tar.gz -C $_C/forgejo data"
  [n8n]="mkdir -p $_B/n8n && tar czf $_B/n8n/config-\$(date +%s).tar.gz -C $_C/n8n data"
  [filebrowser]="mkdir -p $_B/filebrowser && tar czf $_B/filebrowser/config-\$(date +%s).tar.gz -C $_C/filebrowser ."
  [dashy]="mkdir -p $_B/dashy && tar czf $_B/dashy/config-\$(date +%s).tar.gz -C $_C/dashy ."
)

